services:
  - type: web
    name: ppt-translate
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DOUBAO_API_KEY
        sync: false
      - key: DOUBAO_MODEL
        value: doubao-seed-1-6-251015
      - key: DOUBAO_API_URL
        value: https://ark.cn-beijing.volces.com/api/v3/chat/completions
      - key: PREFERRED_TRANSLATION_PROVIDER
        value: auto
      - key: DEEPL_API_KEY
        sync: false
      - key: MATHPIX_APP_ID
        sync: false
      - key: MATHPIX_APP_KEY
        sync: false
      - key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
        sync: false
      - key: AZURE_DOCUMENT_INTELLIGENCE_KEY
        sync: false
      - key: AZURE_DOCUMENT_INTELLIGENCE_MODEL
        value: prebuilt-read
      - key: AWS_TEXTRACT_ACCESS_KEY_ID
        sync: false
      - key: AWS_TEXTRACT_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_TEXTRACT_REGION
        value: us-east-1
      - key: ENABLE_LOCAL_OCR
        value: "true"
      - key: TESSERACT_LANG
        value: eng+chi_sim
